<!doctype html>
<html lang="en">

<head>
  <meta id="viewport" name="viewport"
    content="width=device-width, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" type="text/css" href="styles.css" />
  <link href="https://cdn.jsdelivr.net/npm/quasar@2.1.0/dist/quasar.prod.css" rel="stylesheet" type="text/css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/quasar@2.1.0/dist/quasar.umd.prod.js" defer></script>
  <script src="app.js" defer></script>
</head>

<body style="background: rgba(0, 0, 0, 0.0);">

  <div class="groups-container">
    <div class="header">
      <div class="_info_95j89_41">
        <h1 class="_title_95j89_46">Groups System</h1>
      </div>
    </div>
    <div class="_splitter_95j89_67"></div>

    <div class="groups-main" v-show="mainMenuShow">
      <div class="groups-header">Join or Create a Group to get started...</div>

      <q-item>
        <q-item-section>
          <q-btn color="teal" size="12px" text-color="white" label="Create Group" icon="list"
            v-on:click="CreateGroup($event)" />
        </q-item-section>
      </q-item>
      <q-item>
        <q-item-section>
          <q-btn color="lime-9" size="12px" text-color="white" label="Available Groups" icon="groups"
            v-on:click="AvailableGroups($event)" />
        </q-item-section>
      </q-item>
    </div>

    <div class="group-list" v-show="listShow">
      <div class="groups-header">Available Groups</div>

      <div class="groups-available">
        <q-list v-if="GroupList.length > 0">
          <q-item v-for="(i, v) in GroupList" :key="i.id">
            <q-item-section>
              <q-btn color="teal" size="12px" text-color="white" :label="i.name" icon="task_alt"
                v-on:click="RequestJoin(i.id)" />
            </q-item-section>
          </q-item>
        </q-list>
        <q-item v-else style="text-align:center;">
          <q-item-section>
            <q-banner class="bg-accent text-white">
              There are no groups available
            </q-banner>
          </q-item-section>
        </q-item>
      </div>
    </div>

    <div class="groups-group" v-show="groupShow">
      <div class="groups-header">Current Task: {{CurrentStage}}</div>

      <q-item style="text-align:center;">
        <q-item-section>
          <q-banner class="bg-accent text-white">
            Group Members
          </q-banner>
        </q-item-section>
      </q-item>
      <q-list class="xd-list" id="members">
        <q-item v-for="(i, v) in GroupMembers" :key="i.id">
          <q-item-section text-color="white" color="white">
            <div class="member-name">{{i.name}}</div>
          </q-item-section>
          <q-item-section v-show="isGroupLeader" side>
            <q-btn color="red" size="12px" text-color="white" icon="group_remove" style="max-width: 50px;"
              v-on:click="MemberKick(v, i.id)">
              <q-tooltip anchor="center right" self="center left" :offset="[10, 10]">
                <strong>Kick</strong>
              </q-tooltip>
            </q-btn>
          </q-item-section>
        </q-item>
      </q-list>
    </div>

    <div class="groups-requests" v-show="requestShow">
      <div class="groups-header">Group Requests</div>

      <q-list>
        <q-item v-for="(i, v) in GroupRequests" :key="i.id">
          <q-item-section>
            <q-btn color="teal" size="12px" text-color="white" :label="i.name" style="min-width: 100px;" />
          </q-item-section>
          <q-item-section>
            <q-btn color="green" size="12px" text-color="white" icon="done" label="Accept"
              v-on:click="RequestAccept(v, i.id)" />
          </q-item-section>
          <q-item-section>
            <q-btn color="red" size="12px" text-color="white" icon="block" label="Deny"
              v-on:click="RequestDeny(v, i.id)" />
          </q-item-section>
        </q-item>
      </q-list>
    </div>

    <div class="groups-footer fixed-bottom">
      <q-item>
        <q-item-section v-show="isInGroup && !requestShow">
          <q-btn color="red" size="12px" text-color="white" label="Leave" icon="logout"
            v-on:click="LeaveGroup($event)" />
        </q-item-section>
        <q-item-section v-show="!isInGroup && !mainMenuShow">
          <q-btn color="teal" size="12px" text-color="white" label="Home" v-on:click="MainMenu($event)" />
        </q-item-section>
        <q-item-section v-show="requestShow">
          <q-btn color="blue" size="12px" text-color="white" label="Back" v-on:click="ViewGroup($event)" />
        </q-item-section>
        <q-item-section v-show="isGroupLeader && !requestShow">
          <q-btn color="lime-9" size="12px" text-color="white" label="Requests" icon="format_list_bulleted"
            v-on:click="ViewRequests($event)" />
        </q-item-section>
      </q-item>
    </div>


    

  </div>
  
</body>

</html>
